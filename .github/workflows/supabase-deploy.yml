name: Deploy to Supabase

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Push database migrations
        run: supabase db push

      - name: Deploy Edge Functions
        run: |
          if [ -d "supabase/functions" ] && [ -n "$(ls -A supabase/functions 2>/dev/null)" ]; then
            supabase functions deploy --project-ref "$SUPABASE_PROJECT_ID"
          else
            echo "No edge functions to deploy; skipping."
          fi

      - name: Set Edge Function Secrets
        run: |
          supabase secrets set --project-ref "$SUPABASE_PROJECT_ID" \
            ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            STRIPE_SECRET_KEY="${{ secrets.STRIPE_SECRET_KEY }}" \
            STRIPE_PRICE_ID="${{ secrets.STRIPE_PRICE_ID }}" \
            STRIPE_WEBHOOK_SECRET="${{ secrets.STRIPE_WEBHOOK_SECRET }}" \
            FEEDBACK_EMAIL="${{ secrets.FEEDBACK_EMAIL }}" \
            RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}" \
            APP_URL="https://getbodmax.com"
